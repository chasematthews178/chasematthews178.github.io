name: Monthly Price Monitor
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scripts/price_check.py
        id: check
        continue-on-error: true
      - if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Price Monitor Alert\n\n';
            try { body += fs.readFileSync('price-report.txt','utf8'); } catch(e) { body += 'Review pricing pages manually.'; }
            github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title:`Price Check — ${new Date().toISOString().slice(0,7)}`,body,labels:['price-update']});
