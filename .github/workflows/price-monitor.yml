name: Monthly Price Monitor

on:
  schedule:
    - cron: '0 8 1 * *'   # First day of every month at 8:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write            # Needed to open GitHub Issues for price alerts

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run price check
        id: pricecheck
        run: python scripts/price_check.py
        continue-on-error: true

      - name: Open GitHub Issue if prices changed
        if: steps.pricecheck.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔔 Price Monitor Alert\n\nThe monthly price check detected potential outdated pricing on the site.\n\n';
            try {
              body += fs.readFileSync('price-report.txt', 'utf8');
            } catch(e) {
              body += 'Review tool pricing pages manually.';
            }
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Price Check Alert — ${new Date().toISOString().slice(0,7)}`,
              body: body,
              labels: ['price-update']
            });
