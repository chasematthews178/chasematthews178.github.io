name: Generate Social Media Posts

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/generate_posts.py
      - run: |
          git config user.name "Post Bot"
          git config user.email "bot@users.noreply.github.com"
          git add social-posts/
          git diff --staged --quiet || git commit -m "Weekly social posts $(date +%Y-W%V)"
          git push
