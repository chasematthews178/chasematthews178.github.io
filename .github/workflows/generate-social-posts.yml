name: Generate Social Media Posts

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 AM UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to commit generated posts back to repo

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate social media posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_posts.py

      - name: Commit generated posts
        run: |
          git config user.name "Social Post Bot"
          git config user.email "bot@users.noreply.github.com"
          git add social-posts/
          git diff --staged --quiet || git commit -m "📱 Generated social posts for week $(date +%Y-W%V)"
          git push
